[build]
  publish = "."
  command = ""

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "application/xml"

[[redirects]]
  from = "/art-hill"
  to   = "/art-hill-picnic-st-louis"
  status = 301

[[redirects]]
  from = "/art_hill"
  to   = "/art-hill-picnic-st-louis"
  status = 301

[[redirects]]
  from = "/arthill"
  to   = "/art-hill-picnic-st-louis"
  status = 301

[[redirects]]
  from = "/lunch"
  to   = "/art-hill-picnic-st-louis"
  status = 301

[[redirects]]
  from = "/pagoda-lake"
  to   = "/pagoda-lake-picnic-st-louis"
  status = 301

[[redirects]]
  from = "/pagoda_lake"
  to   = "/pagoda-lake-picnic-st-louis"
  status = 301

[[redirects]]
  from = "/pagoda"
  to   = "/pagoda-lake-picnic-st-louis"
  status = 301

[[redirects]]
  from = "/dinner"
  to   = "/pagoda-lake-picnic-st-louis"
  status = 301

[[redirects]]
  from = "/date-ideas"
  to   = "/forest-park-date-ideas"
  status = 301

[[redirects]]
  from = "/forest-park-dates"
  to   = "/forest-park-date-ideas"
  status = 301

[[redirects]]
  from = "/stl-date-ideas"
  to   = "/forest-park-date-ideas"
  status = 301

# Internal ops docs — not publicly served
[[redirects]]
  from = "/ops/*"
  to   = "/404"
  status = 404
  force  = true
[[redirects]]
  from = '/thanks'
  to   = '/thanks.html'
  status = 200
[[redirects]]
  from = '/accessibility'
  to   = '/accessibility.html'
  status = 200
